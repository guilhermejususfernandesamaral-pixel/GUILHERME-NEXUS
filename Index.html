<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Public Feed</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fafafa; color: #262626; }
        .nav-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #dbdbdb; }
        .post-img { aspect-ratio: 1 / 1; object-fit: cover; width: 100%; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- LOGIN (Simulado) -->
    <div id="login-screen" class="fixed inset-0 z-[100] bg-white flex items-center justify-center">
        <div class="w-full max-w-[350px] p-8 border border-gray-300 rounded-sm flex flex-col items-center">
            <h1 class="text-4xl font-bold italic mb-8">Nexus</h1>
            <input type="text" id="user-name" placeholder="Nome de usuário" class="w-full border border-gray-300 p-2 text-xs rounded-sm mb-2 bg-gray-50 outline-none">
            <button onclick="login()" class="w-full bg-blue-500 text-white font-bold py-1.5 rounded-sm text-sm hover:bg-blue-600 transition">Entrar</button>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="nav-glass fixed top-0 w-full z-50 px-4 py-3">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic tracking-tighter cursor-pointer">Nexus</h1>
            <div class="flex gap-5 items-center">
                <i data-lucide="plus-square" class="w-6 h-6 cursor-pointer hover:scale-110 transition" onclick="openModal()"></i>
                <i data-lucide="log-out" class="w-5 h-5 cursor-pointer text-gray-400" onclick="logout()"></i>
            </div>
        </div>
    </nav>

    <!-- FEED -->
    <main class="max-w-[470px] mx-auto mt-20 p-2" id="feed"></main>

    <!-- MODAL POSTAR -->
    <div id="modal" class="fixed inset-0 bg-black/50 z-[200] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-xl overflow-hidden shadow-2xl">
            <div class="p-4 border-b flex justify-between font-bold">
                <span>Nova Publicação</span>
                <button onclick="closeModal()" class="text-gray-400">X</button>
            </div>
            <div class="p-6 space-y-4">
                <input type="file" id="img-input" accept="image/*" class="text-sm">
                <textarea id="caption-input" placeholder="Escreva uma legenda..." class="w-full h-24 outline-none resize-none text-sm"></textarea>
                <button onclick="publish()" class="w-full bg-blue-500 text-white font-bold py-2 rounded-lg">Publicar Agora</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentUser = localStorage.getItem('nexus_user') || "";

        // Se já estiver logado, pula o login
        if(currentUser) document.getElementById('login-screen').classList.add('hidden');

        function login() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("Digite um nome!");
            localStorage.setItem('nexus_user', name);
            currentUser = name;
            document.getElementById('login-screen').classList.add('hidden');
            renderFeed();
        }

        function logout() {
            localStorage.removeItem('nexus_user');
            location.reload();
        }

        // Funções do Modal
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        // Lógica de Postagens (Salva no navegador para simular "público")
        function publish() {
            const file = document.getElementById('img-input').files[0];
            const caption = document.getElementById('caption-input').value;

            if(!file) return alert("Selecione uma imagem!");

            const reader = new FileReader();
            reader.onload = function(e) {
                const post = {
                    id: Date.now(),
                    user: currentUser,
                    img: e.target.result,
                    text: caption,
                    likes: 0
                };

                // Puxa posts antigos e adiciona o novo
                let allPosts = JSON.parse(localStorage.getItem('nexus_posts')) || [];
                allPosts.unshift(post);
                localStorage.setItem('nexus_posts', JSON.stringify(allPosts));
                
                closeModal();
                renderFeed();
                document.getElementById('caption-input').value = "";
            }
            reader.readAsDataURL(file);
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            const allPosts = JSON.parse(localStorage.getItem('nexus_posts')) || [];
            
            feed.innerHTML = allPosts.map(p => `
                <div class="bg-white border border-gray-300 rounded-lg mb-6 overflow-hidden">
                    <div class="p-3 flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-yellow-400 to-pink-600"></div>
                        <span class="font-bold text-sm">${p.user}</span>
                    </div>
                    <img src="${p.img}" class="post-img border-y border-gray-100">
                    <div class="p-3">
                        <div class="flex gap-4 mb-3">
                            <i data-lucide="heart" class="w-6 h-6 cursor-pointer hover:text-red-500"></i>
                            <i data-lucide="message-circle" class="w-6 h-6 cursor-pointer"></i>
                            <i data-lucide="send" class="w-6 h-6 cursor-pointer"></i>
                        </div>
                        <p class="text-sm"><span class="font-bold">${p.user}</span> ${p.text}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function logout() { localStorage.clear(); location.reload(); }

        // Iniciar
        renderFeed();
    </script>
</body>
</html>
