<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Rede Social Real</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, push, onValue } from "https://gstatic.com";

        // CONFIGURAÇÃO: Cole sua URL entre as aspas abaixo
        const firebaseConfig = {
            databaseURL: "SUA_URL_AQUI", 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Login Simples
        window.login = () => {
            const n = document.getElementById('user-name').value;
            if(!n) return alert("Digite um nome!");
            localStorage.setItem('nexus_user', n);
            location.reload();
        };

        // Postar para o Firebase
        window.publish = () => {
            const user = localStorage.getItem('nexus_user');
            const file = document.getElementById('img-input').files[0];
            const caption = document.getElementById('caption-input').value;

            if(!file) return alert("Selecione uma imagem!");

            const reader = new FileReader();
            reader.onload = (e) => {
                push(ref(db, 'posts'), {
                    user, img: e.target.result, text: caption, date: Date.now()
                }).then(() => { closeModal(); });
            };
            reader.readAsDataURL(file);
        };

        // Escutar posts em tempo real
        onValue(ref(db, 'posts'), (snap) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            const data = snap.val();
            if(data) {
                Object.values(data).reverse().forEach(p => {
                    feed.innerHTML += `
                        <div class="bg-white border border-gray-300 rounded-lg mb-6 shadow-sm">
                            <div class="p-3 flex items-center gap-3 font-bold text-sm">
                                <div class="w-8 h-8 rounded-full bg-indigo-500"></div> ${p.user}
                            </div>
                            <img src="${p.img}" class="w-full aspect-square object-cover">
                            <div class="p-3 text-sm"><span class="font-bold">${p.user}</span> ${p.text}</div>
                        </div>`;
                });
            }
            lucide.createIcons();
        });
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafafa; }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-10">
    <div id="login-screen" class="fixed inset-0 z-50 bg-white flex items-center justify-center">
        <div class="w-full max-w-[350px] p-8 border border-gray-300 rounded-lg text-center">
            <h1 class="text-3xl font-bold italic mb-6">Nexus</h1>
            <input type="text" id="user-name" placeholder="Nome de usuário" class="w-full border p-2 rounded-md mb-4 bg-gray-50 outline-none text-sm">
            <button onclick="login()" class="w-full bg-blue-500 text-white font-bold py-2 rounded-md hover:bg-blue-600 transition">Entrar</button>
        </div>
    </div>

    <nav class="bg-white border-b border-gray-300 fixed top-0 w-full z-40 px-4 py-3 flex justify-between items-center">
        <h1 class="text-2xl font-bold italic tracking-tighter">Nexus</h1>
        <i data-lucide="plus-square" class="w-7 h-7 cursor-pointer text-gray-700 hover:text-blue-500" onclick="openModal()"></i>
    </nav>

    <main class="max-w-[470px] mx-auto mt-20 p-2" id="feed"></main>

    <div id="modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-xl p-6 shadow-2xl">
            <div class="flex justify-between font-bold mb-4"><span>Novo Post</span><button onclick="closeModal()">✕</button></div>
            <input type="file" id="img-input" accept="image/*" class="w-full mb-4 text-xs">
            <textarea id="caption-input" placeholder="Legenda..." class="w-full h-20 border rounded-lg p-2 mb-4 text-sm"></textarea>
            <button onclick="publish()" class="w-full bg-blue-500 text-white font-bold py-3 rounded-lg">Publicar</button>
        </div>
    </div>

    <script>
        if(localStorage.getItem('nexus_user')) document.getElementById('login-screen').classList.add('hidden');
        const openModal = () => document.getElementById('modal').classList.remove('hidden');
        const closeModal = () => document.getElementById('modal').classList.add('hidden');
    </script>
</body>
</html>
